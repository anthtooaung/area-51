<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .split-text {
            display: inline-block;
            overflow: hidden;
        }

        .split-text span {
            display: inline-block;
            opacity: 0;
            transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.5);
            animation: assemble 0.8s ease forwards;
            animation-delay: calc(var(--i) * 0.05s);
        }

        @keyframes assemble {
            to {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
        }
    </style>
</head>

<body>
    <h1 class="split-text">Hello World</h1>

    <script>
        const text = document.querySelector('.split-text');
        const chars = text.textContent.split('');

        text.innerHTML = chars
            .map((char, i) => {
                const x = (Math.random() - 0.5) * 400; // random left/right
                const y = (Math.random() - 0.5) * 400; // random up/down
                const r = (Math.random() - 0.5) * 360; // rotation

                return `<span style="
          --i:${i};
          --x:${x}px;
          --y:${y}px;
          --r:${r}deg;
        ">${char}</span>`;
            })
            .join('');
    </script>
</body>

</html>
