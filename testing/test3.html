<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

    <div class="relative w-full max-w-2xl p-10">

        <!-- Vertical line -->
        <div class="absolute left-6 top-0 bottom-0 w-1 bg-gray-400"></div>

        <div class="space-y-12">

            <!-- Item -->
            <div class="relative flex items-center">

                <!-- Circle (centered on line) -->
                <div
                    class="absolute left-6 transform -translate-x-1/2 w-4 h-4 bg-white border-2 border-gray-400 rounded-full z-10">
                </div>

                <!-- Horizontal line -->
                <div class="ml-6 h-[2px] bg-gray-400 w-16"></div>

                <!-- Box -->
                <div
                    class="ml-4 h-8 w-44 bg-cyan-400 rounded flex items-center justify-center text-xs text-black shadow-lg">
                    1955 - CIA Acquisition
                </div>

            </div>

            <!-- Item -->
            <div class="relative flex items-center">
                <div
                    class="absolute left-6 transform -translate-x-1/2 w-4 h-4 bg-white border-2 border-gray-400 rounded-full z-10">
                </div>
                <div class="ml-6 h-[2px] bg-gray-400 w-24"></div>
                <div
                    class="ml-4 h-8 w-44 bg-cyan-400 rounded flex items-center justify-center text-xs text-black shadow-lg">
                    1960s - Project OXCART
                </div>
            </div>

            <!-- Item -->
            <div class="relative flex items-center">
                <div
                    class="absolute left-6 transform -translate-x-1/2 w-4 h-4 bg-white border-2 border-gray-400 rounded-full z-10">
                </div>
                <div class="ml-6 h-[2px] bg-gray-400 w-32"></div>
                <div
                    class="ml-4 h-8 w-44 bg-cyan-400 rounded flex items-center justify-center text-xs text-black shadow-lg">
                    1977 - Have Blue
                </div>
            </div>

            <!-- Item -->
            <div class="relative flex items-center">
                <div
                    class="absolute left-6 transform -translate-x-1/2 w-4 h-4 bg-white border-2 border-gray-400 rounded-full z-10">
                </div>
                <div class="ml-6 h-[2px] bg-gray-400 w-40"></div>
                <div
                    class="ml-4 h-8 w-44 bg-cyan-400 rounded flex items-center justify-center text-xs text-black shadow-lg">
                    1989 - Bob Lazar
                </div>
            </div>

            <!-- Item -->
            <div class="relative flex items-center">
                <div
                    class="absolute left-6 transform -translate-x-1/2 w-4 h-4 bg-white border-2 border-gray-400 rounded-full z-10">
                </div>
                <div class="ml-6 h-[2px] bg-gray-400 w-48"></div>
                <div
                    class="ml-4 h-8 w-44 bg-cyan-400 rounded flex items-center justify-center text-xs text-black shadow-lg">
                    2013 - CIA Acknowledgment
                </div>
            </div>

            <!-- Item -->
            <div class="relative flex items-center">
                <div
                    class="absolute left-6 transform -translate-x-1/2 w-4 h-4 bg-white border-2 border-gray-400 rounded-full z-10">
                </div>
                <div class="ml-6 h-[2px] bg-gray-400 w-56"></div>
                <div
                    class="ml-4 h-8 w-44 bg-cyan-400 rounded flex items-center justify-center text-xs text-black shadow-lg">
                    2019 - Storm Area 51
                </div>
            </div>

        </div>

    </div>

</body>

</html>
